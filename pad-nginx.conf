server {
    listen 80;
    listen [::]:80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self'; connect-src 'self' wss://example.com; img-src 'none'; font-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Rate limiting (defined in conf.d/pad-ratelimit.conf)
    limit_req zone=pad burst=20 nodelay;

    # robots.txt
    location = /robots.txt {
        root /opt/pad/static;
    }

    # Landing page
    location = / {
        root /opt/pad/static;
        try_files /index.html =404;
    }

    # Static assets
    location /static/ {
        alias /opt/pad/static/;
        expires 5m;
        add_header Cache-Control "public, no-transform";
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Limit WebSocket connection rate per IP
        limit_req zone=ws burst=5 nodelay;
    }

    # Pad pages — any other path serves pad.html
    location / {
        root /opt/pad/static;
        try_files $uri /pad.html;
        add_header Cache-Control "no-cache";
    }
}
